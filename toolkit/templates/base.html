<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Hermes Toolkit{% endblock %}</title>
  {% block refresh %}{% endblock %}
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img class="brand-logo" src="/static/logo.png" alt="Hermes Toolkit logo">
      <div>
        <div class="brand-title">Hermes Toolkit</div>
        <div class="brand-subtitle">Control. Optimize. Evolve.</div>
      </div>
    </div>

    <nav class="nav">
      <a class="{% if active_page == 'dashboard' %}active{% endif %}" href="/">⌂ Dashboard</a>
      <a class="{% if active_page == 'analytics' %}active{% endif %}" href="/analytics">↗ Analytics</a>
      <a class="disabled" href="#">$ Cost</a>
      <a class="disabled" href="#">✚ Doctor</a>
      <a class="{% if active_page == 'configuration' %}active{% endif %}" href="/configuration">⚙ Configuration</a>
      <a class="disabled" href="#">◎ Models</a>
      <a class="disabled" href="#">◉ Sessions</a>
      <a class="disabled" href="#">☰ Logs</a>
      <a class="disabled" href="#">◇ Skills</a>
      <a class="disabled" href="#">◌ Memory</a>
      <a class="disabled" href="#">ⓘ About</a>
    </nav>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
